name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m unittest discover -s tests -q

      - name: Run lint
        run: ruff check .

      - name: Run no-install smoke test
        run: |
          PYTHONPATH=src python -m freqtrade_report_kit.cli \
            examples/backtest-result.sample.json \
            --output /tmp/freqtrade-report-kit-smoke.md \
            --fail-under-profit-factor 1.3 \
            --fail-over-drawdown 20 \
            --fail-under-trades 3
